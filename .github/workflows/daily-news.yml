name: Daily news briefing

on:
  schedule:
    # GitHub cron uses UTC. 12:00 UTC is 20:00 in Asia/Shanghai.
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: daily-news-briefing
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate briefing
        run: python scripts/generate_digest.py --output report.md

      - name: Send briefing through QQ Mail
        env:
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python scripts/send_email.py --report report.md

      - name: Create or update today's issue
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync("report.md", "utf8");
            const date = new Intl.DateTimeFormat("sv-SE", {
              timeZone: "Asia/Shanghai",
              year: "numeric",
              month: "2-digit",
              day: "2-digit",
            }).format(new Date());
            const title = `每日资讯简报 | ${date}`;

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });
            const existing = issues.find(
              (issue) => !issue.pull_request && issue.title === title,
            );

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              core.info(`Updated issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
              core.info(`Created issue #${created.data.number}`);
            }
